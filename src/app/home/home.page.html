<ion-header>
  <ion-toolbar color="primary">
    <ion-title>FinanzApp</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="irAAyuda()" title="Ayuda">
        <ion-icon name="help-circle-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="irAApiDemo()" title="API Demo">
        <ion-icon name="cloud-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="irAMapa()" title="Mapa">
        <ion-icon name="map-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="irACamara()" title="Cámara">
        <ion-icon name="camera-outline" slot="icon-only"></ion-icon>
      </ion-button>
      <ion-button (click)="cerrarSesion()" title="Cerrar sesión">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <!-- Saludo con animación -->
  <div class="home-header-section">
    <p class="saludo-sub">Bienvenido de vuelta,</p>
    <h2 class="saludo-nombre">{{ usuarioLogin }} 👋</h2>

    <!-- Accesos rápidos -->
    <div class="accesos-rapidos">
      <button class="accion-btn" (click)="irARegistrar()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <span>Registrar</span>
      </button>
      <button class="accion-btn" (click)="irAResumen()">
        <ion-icon name="bar-chart-outline"></ion-icon>
        <span>Resumen</span>
      </button>
      <button class="accion-btn" (click)="irAMapa()">
        <ion-icon name="location-outline"></ion-icon>
        <span>Mapa</span>
      </button>
      <button class="accion-btn" (click)="irACamara()">
        <ion-icon name="camera-outline"></ion-icon>
        <span>Cámara</span>
      </button>
      <button class="accion-btn" (click)="irAAyuda()">
        <ion-icon name="help-circle-outline"></ion-icon>
        <span>Ayuda</span>
      </button>
    </div>
  </div>

  <!-- Segment con los 3 componentes (S4) -->
  <ion-segment [value]="segmentoActivo" (ionChange)="cambiarSegmento($event)" class="home-segment">
    <ion-segment-button value="misDatos">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>Mis Datos</ion-label>
    </ion-segment-button>
    <ion-segment-button value="experiencia">
      <ion-icon name="briefcase-outline"></ion-icon>
      <ion-label>Experiencia</ion-label>
    </ion-segment-button>
    <ion-segment-button value="certificaciones">
      <ion-icon name="ribbon-outline"></ion-icon>
      <ion-label>Certificados</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="segment-content ion-padding">
    <div *ngIf="segmentoActivo === 'misDatos'">
      <app-mis-datos></app-mis-datos>
    </div>
    <div *ngIf="segmentoActivo === 'experiencia'">
      <app-experiencia-laboral></app-experiencia-laboral>
    </div>
    <div *ngIf="segmentoActivo === 'certificaciones'">
      <app-certificaciones></app-certificaciones>
    </div>
  </div>

</ion-content>
