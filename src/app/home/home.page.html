<ion-header>
  <ion-toolbar color="primary">
    <ion-title>FinanzApp</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cerrarSesion()">
        <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="home-content">

  <!-- Header saludo -->
  <div class="header-section">
    <p class="saludo-sub">Bienvenido de vuelta,</p>
    <h2 class="saludo-nombre">{{ usuarioLogin }} 👋</h2>
  </div>

  <!-- Card saldo del mes -->
  <div class="saldo-card">
    <p class="saldo-label">Gasto total del mes</p>
    <h1 class="saldo-monto">{{ formatMonto(totalMes) }}</h1>
    <p class="saldo-periodo">Junio 2025</p>

    <div class="accesos-rapidos">
      <button class="accion-btn" (click)="irARegistrar()">
        <ion-icon name="add-circle-outline"></ion-icon>
        <span>Registrar</span>
      </button>
      <button class="accion-btn" (click)="irAResumen()">
        <ion-icon name="bar-chart-outline"></ion-icon>
        <span>Resumen</span>
      </button>
      <button class="accion-btn" (click)="irAAyuda()">
        <ion-icon name="help-circle-outline"></ion-icon>
        <span>Ayuda</span>
      </button>
    </div>
  </div>

  <!-- Gastos recientes -->
  <div class="section-container">
    <div class="section-header">
      <h3 class="section-title">Gastos recientes</h3>
      <span class="ver-todos" (click)="irAResumen()">Ver todos</span>
    </div>

    <div class="gastos-list">
      <div *ngFor="let gasto of gastosRecientes" class="gasto-item">
        <div class="gasto-icono-wrap">
          <ion-icon [name]="gasto.icono" class="gasto-icono"></ion-icon>
        </div>
        <div class="gasto-info">
          <p class="gasto-desc">{{ gasto.descripcion }}</p>
          <p class="gasto-cat">{{ gasto.categoria }} · {{ gasto.fecha }}</p>
        </div>
        <p class="gasto-monto">{{ formatMonto(gasto.monto) }}</p>
      </div>
    </div>
  </div>

</ion-content>
