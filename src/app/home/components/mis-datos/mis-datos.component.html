<div class="comp-wrap">

  <div class="comp-header">
    <ion-icon name="person-circle-outline"></ion-icon>
    <h3>Mis Datos</h3>
  </div>

  <ion-card>
    <ion-card-content>
      <ion-item lines="full">
        <ion-label position="floating">Nombre completo</ion-label>
        <ion-input type="text" [(ngModel)]="nombre" placeholder="Ej: Juan Pérez"></ion-input>
      </ion-item>
      <ion-item lines="full">
        <ion-label position="floating">Email</ion-label>
        <ion-input type="email" [(ngModel)]="email" placeholder="juan@email.com"></ion-input>
      </ion-item>
      <ion-item lines="full">
        <ion-label position="floating">Teléfono</ion-label>
        <ion-input type="tel" [(ngModel)]="telefono" placeholder="+56 9 1234 5678"></ion-input>
      </ion-item>
      <ion-item lines="full">
        <ion-label position="floating">Profesión</ion-label>
        <ion-input type="text" [(ngModel)]="profesion" placeholder="Ej: Ing. en Informática"></ion-input>
      </ion-item>
      <ion-button expand="block" color="primary" (click)="guardar()" style="margin-top:16px">
        <ion-icon name="save-outline" slot="start"></ion-icon>
        Guardar en Storage
      </ion-button>
    </ion-card-content>
  </ion-card>

  <div *ngIf="guardado" class="success-msg">
    <ion-icon name="checkmark-circle-outline"></ion-icon>
    Datos guardados en Storage correctamente
  </div>

</div>
