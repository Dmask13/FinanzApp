<ion-header>
  <ion-toolbar color="danger">
    <ion-title>Página No Encontrada</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding ion-text-center nf-content">
  <div class="nf-container">
    <ion-icon name="alert-circle-outline" class="nf-icon"></ion-icon>
    <h1 class="nf-code">404</h1>
    <h2 class="nf-title">Página no encontrada</h2>
    <p class="nf-msg">La URL que ingresaste no existe en la aplicación.</p>
    <ion-button expand="block" color="primary" (click)="irHome()">
      <ion-icon name="home-outline" slot="start"></ion-icon>
      Volver al Home
    </ion-button>
  </div>
</ion-content>
