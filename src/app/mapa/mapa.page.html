<ion-header>
  <ion-toolbar color="primary">
    <ion-buttons slot="start">
      <ion-button (click)="volver()">
        <ion-icon name="arrow-back-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>Mapa – Geolocalización</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="mapa-content">

  <!-- Mapa -->
  <div id="mapa-container" class="mapa-box"></div>

  <!-- Info ubicación en tiempo real -->
  <div class="geo-info ion-padding">

    <ion-card color="danger" *ngIf="errorGeo">
      <ion-card-content>
        <ion-icon name="warning-outline"></ion-icon> {{ errorGeo }}
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="latitud !== null">
      <ion-card-content>
        <h3 class="geo-title">📍 Ubicación en tiempo real</h3>
        <ion-item lines="none">
          <ion-icon name="navigate-outline" slot="start" color="primary"></ion-icon>
          <ion-label>
            <p><strong>Latitud:</strong> {{ latitud!.toFixed(6) }}</p>
            <p><strong>Longitud:</strong> {{ longitud!.toFixed(6) }}</p>
            <p><strong>Precisión:</strong> ±{{ precision }} metros</p>
          </ion-label>
        </ion-item>
      </ion-card-content>
    </ion-card>

    <ion-card *ngIf="latitud === null && !errorGeo">
      <ion-card-content class="ion-text-center">
        <ion-spinner name="crescent" color="primary"></ion-spinner>
        <p>Obteniendo ubicación...</p>
      </ion-card-content>
    </ion-card>

  </div>

</ion-content>
